<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>File Browser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0b111e',
                        darkcard: '#172033',
                        darkinput: '#243147',
                        lightbg: '#f0f4f8',
                        lightcard: '#ffffff',
                        lightinput: '#e8edf3',
                        brand: '#3b82f6'
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-lightbg dark:bg-darkbg text-slate-800 dark:text-slate-200 transition-colors duration-300 min-h-screen font-sans flex justify-center p-3 sm:p-6">

    <div class="w-full max-w-2xl mt-8">

        <!-- Header -->
        <div class="flex items-center justify-between gap-2 mb-6 w-full">
            <div class="flex-1 min-w-0">
                <h1 class="text-xl sm:text-2xl font-bold text-brand flex items-center gap-2 truncate">
                    <i class="fa-solid fa-folder-open shrink-0"></i> File Browser
                </h1>
                <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5 truncate" style="margin-left: 28px;">Browse your files with style</p>
            </div>

            <div class="flex items-center gap-1.5 shrink-0">
                <!-- Theme Toggle Pill -->
                <div class="bg-white dark:bg-darkinput rounded-full p-1 shadow-sm border border-slate-200 dark:border-slate-700 flex gap-1 cursor-pointer" onclick="toggleTheme()">
                    <div id="btn-light" class="w-7 h-7 rounded-full flex items-center justify-center bg-brand text-white transition-colors">
                        <i class="fa-solid fa-sun text-xs"></i>
                    </div>
                    <div id="btn-dark" class="w-7 h-7 rounded-full flex items-center justify-center text-slate-400 transition-colors">
                        <i class="fa-solid fa-moon text-xs"></i>
                    </div>
                </div>

                <!-- View Toggle Pill -->
                <div class="bg-white dark:bg-darkinput rounded-full p-1 shadow-sm border border-slate-200 dark:border-slate-700 flex gap-1 cursor-pointer" onclick="toggleView()">
                    <div id="btn-list" class="w-7 h-7 rounded-full flex items-center justify-center bg-brand text-white transition-colors">
                        <i class="fa-solid fa-list text-xs"></i>
                    </div>
                    <div id="btn-grid" class="w-7 h-7 rounded-full flex items-center justify-center text-slate-400 transition-colors">
                        <i class="fa-solid fa-border-all text-xs"></i>
                    </div>
                </div>

                <!-- Sort Toggle Pill -->
                <div class="bg-white dark:bg-darkinput rounded-full p-1 shadow-sm border border-slate-200 dark:border-slate-700 flex gap-1 cursor-pointer relative" onclick="toggleSortMenu(event)">
                    <div id="btn-sort" class="w-7 h-7 rounded-full flex items-center justify-center text-slate-400 transition-colors">
                        <i class="fa-solid fa-arrow-down-wide-short text-xs"></i>
                    </div>
                    <div id="sortMenu" class="hidden absolute top-full right-0 mt-2 bg-white dark:bg-darkcard rounded-xl shadow-lg border border-slate-200 dark:border-slate-700 w-44 z-50 overflow-hidden">
                        <button onclick="setSort('name', event)" class="w-full text-left px-4 py-2.5 text-xs font-semibold text-slate-700 dark:text-slate-200 hover:bg-lightinput dark:hover:bg-darkinput transition-colors">Sort by Name</button>
                        <button onclick="setSort('date', event)" class="w-full text-left px-4 py-2.5 text-xs font-semibold text-slate-700 dark:text-slate-200 hover:bg-lightinput dark:hover:bg-darkinput transition-colors">Sort by Date</button>
                        <button onclick="setSort('size', event)" class="w-full text-left px-4 py-2.5 text-xs font-semibold text-slate-700 dark:text-slate-200 hover:bg-lightinput dark:hover:bg-darkinput transition-colors">Sort by Size</button>
                        <button onclick="setSort('type', event)" class="w-full text-left px-4 py-2.5 text-xs font-semibold text-slate-700 dark:text-slate-200 hover:bg-lightinput dark:hover:bg-darkinput transition-colors">Sort by Type</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Search Card -->
        <div class="bg-lightcard dark:bg-darkcard rounded-xl p-1.5 shadow-sm border border-slate-200 dark:border-slate-700/60 mb-5">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                <input type="text" id="searchInput" placeholder="Search files..." 
                    class="w-full bg-lightinput dark:bg-darkinput rounded-xl py-3 pl-10 pr-4 outline-none font-mono text-xs sm:text-sm border border-transparent focus:border-brand/40 transition-all text-slate-800 dark:text-slate-200">
            </div>
        </div>

        <!-- File Browser Card -->
        <div class="bg-lightcard dark:bg-darkcard rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700/60 overflow-hidden">

            <!-- File Header -->
            <div id="fileHeader" class="hidden sm:grid grid-cols-[2fr_1fr_1fr_1.5fr] px-5 py-3 bg-lightinput dark:bg-darkinput border-b border-slate-200 dark:border-slate-700/60">
                <div class="col-name sortable cursor-pointer select-none flex items-center gap-1 text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider" onclick="cycleSort('name')">
                    Name <span class="sort-arrow opacity-50 font-normal">⇅</span>
                </div>
                <div class="col-type sortable cursor-pointer select-none flex items-center gap-1 text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider" onclick="cycleSort('type')">
                    Type <span class="sort-arrow opacity-50 font-normal">⇅</span>
                </div>
                <div class="col-size sortable cursor-pointer select-none flex items-center gap-1 text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider" onclick="cycleSort('size')">
                    Size <span class="sort-arrow opacity-50 font-normal">⇅</span>
                </div>
                <div class="col-date sortable cursor-pointer select-none flex items-center gap-1 text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider" onclick="cycleSort('date')">
                    Modified <span class="sort-arrow opacity-50 font-normal">⇅</span>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="py-12 text-center">
                <div class="w-10 h-10 border-3 border-slate-200 dark:border-slate-700 border-t-brand rounded-full animate-spin mx-auto mb-3"></div>
                <p class="text-xs text-slate-500 dark:text-slate-400">Loading files...</p>
            </div>

            <!-- Error State -->
            <div id="errorState" class="hidden py-12 text-center text-red-500">
                <i class="fa-solid fa-circle-exclamation text-3xl mb-2"></i>
                <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Failed to load files. Please check your repository settings.</p>
            </div>

            <!-- File List -->
            <ul id="fileList" class="list-none"></ul>

            <!-- No Results -->
            <div id="noResults" class="hidden py-12 text-center text-xs text-slate-500 dark:text-slate-400">No files match your search.</div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden py-12 text-center text-xs text-slate-500 dark:text-slate-400">No files found.</div>
        </div>
    </div>

    <script>
        // ========================
        // CONFIGURATION
        // ========================
        const GITHUB_USER = 'stofprof';
        const GITHUB_REPO = 'mypages';
        const REPO_PATH = '';
        const HIDDEN_FILES = ['index.html', '.gitignore', 'README.md', 'LICENSE'];
        const TIME_FORMAT = { month: 'short', day: 'numeric', year: 'numeric' };

        // ========================
        // STATE
        // ========================
        let allFiles = [];
        let sortColumn = 'name';
        let sortOrder = 'asc';
        let viewMode = 'list';
        let isDark = false;

        // ========================
        // THEME MANAGEMENT
        // ========================
        function toggleTheme() {
            const htmlNode = document.documentElement;
            const btnLight = document.getElementById('btn-light');
            const btnDark = document.getElementById('btn-dark');
            isDark = !isDark;

            if (isDark) {
                htmlNode.classList.add('dark');
                htmlNode.classList.remove('light');
                btnDark.classList.add('bg-brand', 'text-white');
                btnDark.classList.remove('text-slate-400');
                btnLight.classList.remove('bg-brand', 'text-white');
                btnLight.classList.add('text-slate-400');
            } else {
                htmlNode.classList.remove('dark');
                htmlNode.classList.add('light');
                btnLight.classList.add('bg-brand', 'text-white');
                btnLight.classList.remove('text-slate-400');
                btnDark.classList.remove('bg-brand', 'text-white');
                btnDark.classList.add('text-slate-400');
            }
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Init theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            isDark = false;
            toggleTheme();
        }

        // ========================
        // ICON HELPERS
        // ========================
        function getFileIconClass(filename, isDir) {
            if (isDir) return 'fa-solid fa-folder text-brand';
            const ext = filename.split('.').pop().toLowerCase();
            switch (ext) {
                case 'png': case 'jpg': case 'jpeg': case 'gif': case 'svg': case 'webp': case 'bmp': case 'ico':
                    return 'fa-solid fa-image text-brand';
                case 'js': case 'php': case 'html': case 'css': case 'json': case 'py': case 'java': case 'cpp': case 'c': case 'h': case 'ts': case 'jsx': case 'tsx': case 'xml': case 'yaml': case 'yml': case 'sql': case 'sh': case 'bash': case 'zsh':
                    return 'fa-solid fa-code text-brand';
                case 'xls': case 'xlsx': case 'csv': case 'ods':
                    return 'fa-solid fa-file-excel text-brand';
                case 'zip': case 'rar': case 'tar': case 'gz': case 'bz2': case '7z':
                    return 'fa-solid fa-file-zipper text-brand';
                case 'pdf':
                    return 'fa-solid fa-file-pdf text-brand';
                case 'mp4': case 'avi': case 'mkv': case 'mov': case 'wmv': case 'flv': case 'webm':
                    return 'fa-solid fa-file-video text-brand';
                case 'mp3': case 'wav': case 'flac': case 'aac': case 'ogg': case 'm4a':
                    return 'fa-solid fa-file-audio text-brand';
                case 'doc': case 'docx': case 'odt': case 'rtf':
                    return 'fa-solid fa-file-word text-brand';
                case 'ppt': case 'pptx': case 'odp':
                    return 'fa-solid fa-file-powerpoint text-brand';
                case 'txt': case 'md': case 'log':
                    return 'fa-solid fa-file-lines text-brand';
                default:
                    return 'fa-solid fa-file text-brand';
            }
        }

        function formatSize(bytes) {
            if (bytes === undefined || bytes === null || bytes === '-') return '—';
            const b = parseInt(bytes);
            if (b >= 1073741824) return (b / 1073741824).toFixed(2) + ' GB';
            if (b >= 1048576) return (b / 1048576).toFixed(2) + ' MB';
            if (b >= 1024) return (b / 1024).toFixed(2) + ' KB';
            return b + ' bytes';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '—';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return '—';
            return d.toLocaleDateString('en-US', TIME_FORMAT);
        }

        function buildPageUrl(path) {
            return `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/${path}`;
        }

        // ========================
        // FETCH FILES FROM GITHUB
        // ========================
        async function fetchFiles() {
            const loadingState = document.getElementById('loadingState');
            const errorState = document.getElementById('errorState');
            const fileList = document.getElementById('fileList');

            loadingState.style.display = 'block';
            errorState.classList.add('hidden');
            fileList.innerHTML = '';

            try {
                const apiPath = REPO_PATH ? encodeURIComponent(REPO_PATH).replace(/%2F/g, '/') : '';
                const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${apiPath}`;
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                allFiles = data
                    .filter(item => !HIDDEN_FILES.includes(item.name))
                    .map(item => ({
                        name: item.name,
                        type: item.type === 'dir' ? 'Folder' : (item.name.split('.').pop().toUpperCase() || 'File'),
                        size: item.type === 'dir' ? '-' : item.size,
                        date: null,
                        isDir: item.type === 'dir',
                        url: buildPageUrl(item.path),
                        path: item.path
                    }));

                loadingState.style.display = 'none';

                if (allFiles.length === 0) {
                    document.getElementById('emptyState').classList.remove('hidden');
                } else {
                    sortAndRender();
                }

            } catch (err) {
                loadingState.style.display = 'none';
                errorState.classList.remove('hidden');
                console.error('Error fetching files:', err);
            }
        }

        // ========================
        // SORTING & RENDERING
        // ========================
        function sortFiles() {
            allFiles.sort((a, b) => {
                if (a.isDir !== b.isDir) return a.isDir ? -1 : 1;

                let valA = a[sortColumn];
                let valB = b[sortColumn];

                if (valA == null) valA = '';
                if (valB == null) valB = '';

                if (sortColumn === 'name') {
                    const cmp = valA.toString().localeCompare(valB.toString(), undefined, { sensitivity: 'base', numeric: true });
                    return sortOrder === 'asc' ? cmp : -cmp;
                }

                if (sortColumn === 'size') {
                    const sizeA = valA === '-' ? -1 : parseInt(valA);
                    const sizeB = valB === '-' ? -1 : parseInt(valB);
                    return sortOrder === 'asc' ? (sizeA - sizeB) : (sizeB - sizeA);
                }

                if (sortColumn === 'date') {
                    const dateA = valA ? new Date(valA).getTime() : 0;
                    const dateB = valB ? new Date(valB).getTime() : 0;
                    return sortOrder === 'asc' ? (dateA - dateB) : (dateB - dateA);
                }

                const cmp = valA.toString().localeCompare(valB.toString());
                return sortOrder === 'asc' ? cmp : -cmp;
            });
        }

        function renderFiles() {
            const fileList = document.getElementById('fileList');
            const fileHeader = document.getElementById('fileHeader');

            fileHeader.style.display = viewMode === 'list' ? 'grid' : 'none';

            // Update sort arrows
            const cols = ['name', 'type', 'size', 'date'];
            document.querySelectorAll('.sortable').forEach((el, idx) => {
                const arrow = el.querySelector('.sort-arrow');
                if (cols[idx] === sortColumn) {
                    arrow.textContent = sortOrder === 'asc' ? '↑' : '↓';
                    arrow.style.opacity = '1';
                } else {
                    arrow.textContent = '⇅';
                    arrow.style.opacity = '0.5';
                }
            });

            fileList.innerHTML = '';

            if (viewMode === 'list') {
                fileList.className = 'list-none';
                allFiles.forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'grid grid-cols-1 sm:grid-cols-[2fr_1fr_1fr_1.5fr] px-5 py-3.5 border-b border-slate-200 dark:border-slate-700/60 hover:bg-lightinput dark:hover:bg-darkinput transition-colors cursor-pointer';
                    li.setAttribute('data-name', file.name.toLowerCase());

                    const iconClass = getFileIconClass(file.name, file.isDir);
                    const target = file.isDir ? '_self' : '_blank';

                    li.innerHTML = `
                        <div class="flex items-center gap-3 min-w-0">
                            <i class="${iconClass} text-sm shrink-0"></i>
                            <a href="${file.url}" target="${target}" class="text-sm font-medium text-slate-800 dark:text-slate-200 hover:text-brand truncate">${escapeHtml(file.name)}</a>
                        </div>
                        <div class="text-xs text-slate-500 dark:text-slate-400 sm:mt-0 mt-1 pl-7 sm:pl-0">${escapeHtml(file.type)}</div>
                        <div class="text-xs text-slate-500 dark:text-slate-400 sm:mt-0 mt-0.5 pl-7 sm:pl-0">${file.size === '-' ? '-' : formatSize(file.size)}</div>
                        <div class="text-xs text-slate-500 dark:text-slate-400 sm:mt-0 mt-0.5 pl-7 sm:pl-0">${formatDate(file.date)}</div>
                    `;
                    fileList.appendChild(li);
                });
            } else {
                fileList.className = 'grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 p-5';
                allFiles.forEach(file => {
                    const div = document.createElement('div');
                    div.className = 'flex flex-col items-center text-center p-5 rounded-xl border border-slate-200 dark:border-slate-700/60 bg-lightinput dark:bg-darkinput hover:border-brand dark:hover:border-brand transition-all cursor-pointer hover:-translate-y-0.5 hover:shadow-sm';
                    div.setAttribute('data-name', file.name.toLowerCase());

                    const iconClass = getFileIconClass(file.name, file.isDir);
                    const target = file.isDir ? '_self' : '_blank';

                    div.innerHTML = `
                        <a href="${file.url}" target="${target}" class="flex flex-col items-center gap-3 w-full">
                            <i class="${iconClass} text-3xl"></i>
                            <span class="text-xs font-medium text-slate-800 dark:text-slate-200 break-words w-full line-clamp-2">${escapeHtml(file.name)}</span>
                        </a>
                    `;
                    fileList.appendChild(div);
                });
            }

            applySearch();
        }

        function sortAndRender() {
            sortFiles();
            renderFiles();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========================
        // SEARCH
        // ========================
        function applySearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('[data-name]');
            const noResults = document.getElementById('noResults');
            let visibleCount = 0;

            items.forEach(item => {
                const name = item.getAttribute('data-name');
                if (name.includes(term)) {
                    item.style.display = '';
                    visibleCount++;
                } else {
                    item.style.display = 'none';
                }
            });

            noResults.classList.toggle('hidden', visibleCount > 0 || items.length === 0);
        }

        document.getElementById('searchInput').addEventListener('input', applySearch);

        // ========================
        // VIEW TOGGLE
        // ========================
        function toggleView() {
            viewMode = viewMode === 'list' ? 'grid' : 'list';
            localStorage.setItem('viewMode', viewMode);

            const btnList = document.getElementById('btn-list');
            const btnGrid = document.getElementById('btn-grid');

            if (viewMode === 'grid') {
                btnGrid.classList.add('bg-brand', 'text-white');
                btnGrid.classList.remove('text-slate-400');
                btnList.classList.remove('bg-brand', 'text-white');
                btnList.classList.add('text-slate-400');
            } else {
                btnList.classList.add('bg-brand', 'text-white');
                btnList.classList.remove('text-slate-400');
                btnGrid.classList.remove('bg-brand', 'text-white');
                btnGrid.classList.add('text-slate-400');
            }

            renderFiles();
        }

        const savedView = localStorage.getItem('viewMode') || 'list';
        if (savedView === 'grid') {
            viewMode = 'list';
            toggleView();
        }

        // ========================
        // SORT MENU
        // ========================
        function toggleSortMenu(e) {
            e.stopPropagation();
            document.getElementById('sortMenu').classList.toggle('hidden');
        }

        window.addEventListener('click', () => {
            document.getElementById('sortMenu').classList.add('hidden');
        });

        function setSort(col, e) {
            e.stopPropagation();
            if (sortColumn === col) {
                sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = col;
                sortOrder = 'asc';
            }
            document.getElementById('sortMenu').classList.add('hidden');
            sortAndRender();
        }

        function cycleSort(col) {
            if (sortColumn === col) {
                sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = col;
                sortOrder = 'asc';
            }
            sortAndRender();
        }

        // ========================
        // INIT
        // ========================
        fetchFiles();
    </script>
</body>
</html>
